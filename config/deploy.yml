# Name of your application. Used to uniquely configure containers.
service: stem-app

# Name of the container image.
image: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>/stem-app

# Deploy to these servers.
servers:
  web:
    - <%= ENV["VPS_IP"] %>
  job:
    hosts:
      - <%= ENV["VPS_IP"] %>
    cmd: bin/jobs

# Enable SSL auto certification via Let's Encrypt.
# Kamal 2 uses kamal-proxy for this.
proxy:
  ssl: true
  host: <%= ENV["APP_DOMAIN"] %>
  app_port: 80

# Credentials for your image host.
registry:
  server: ghcr.io
  username:
    - DOCKER_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# Configure builder setup.
builder:
  arch: amd64

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - STEM_APP_DATABASE_PASSWORD
    - DB_HOST

# Use a persistent storage volume for Active Storage and SQLite-backed services.
volumes:
  - "stem_app_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404 on in-flight requests.
asset_path: /rails/public/assets

# Use accessory services (secrets come from .kamal/secrets).
accessories:
  db:
    image: postgres:16
    host: <%= ENV["VPS_IP"] %>
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: stem_app
        POSTGRES_DB: stem_app_production
      secret:
        - POSTGRES_PASSWORD
    files:
      - config/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    directories:
      - data:/var/lib/postgresql/data

# SSH configuration
ssh:
  user: root
